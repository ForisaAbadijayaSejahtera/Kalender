<!DOCTYPE html>
<html lang="id">

        .modal-date-row.chinese .icon { background: #fef3c7; }
        .modal-date-row.hebrew .icon { background: #f3e8ff; }
        .modal-date-row.pasaran .icon { background: #ffedd5; }

        .modal-date-row .info {

        .modal-date-row .info .label {
            font-size: 0.75rem;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 2px;
        }

        .modal-date-row .info .value {
            font-size: 1rem;
            font-weight: 600;
            color: #1e293b;
        }

        .modal-date-row .info .sub {

            color: #64748b;
            margin-top: 2px;
        }

                min-height: 65px;

            .day-cell .gregorian { font-size: 0.85rem; }
            .day-cell .hijri-small, .day-cell .chinese-small { font-size: 0.45rem; }
            .day-cell .pasaran-small { font-size: 0.45rem; }
            header h1 { font-size: 1.4rem; }
            .dates-grid { grid-template-columns: 1fr 1fr; }
            .date-box .day-num { font-size: 1.8rem; }
            .modal { padding: 20px; }
        }
    </style>
</head>
<body>

    <script>
        // ============================================================

        const chineseNewYearData = {

            2099: [1,22], 2100: [2,11]
        };

        const chineseMonths = [
            "Chiat Gwee", "Di Gwee", "Sa Gwee", "Si Gwee", "Go Gwee", "Lak Gwee",
            "Chit Gwee", "Pat Gwee", "Kau Gwee", "Chap Gwee", "Chap-it Gwee", "Chap-ji Gwee"
        ];

        const chineseDays = [
            "Tanggal 1", "Tanggal 2", "Tanggal 3", "Tanggal 4", "Tanggal 5",
            "Tanggal 6", "Tanggal 7", "Tanggal 8", "Tanggal 9", "Tanggal 10",
            "Tanggal 11", "Tanggal 12", "Tanggal 13", "Tanggal 14", "Tanggal 15",

            "Tanggal 21", "Tanggal 22", "Tanggal 23", "Tanggal 24", "Tanggal 25",

        ];

        const chineseZodiac = [
            "Tikus", "Kerbau", "Macan", "Kelinci", "Naga", "Ular",
            "Kuda", "Kambing", "Monyet", "Ayam", "Anjing", "Babi"
        ];

        // ============================================================
        // DATA KALENDER IBRANI (Hebrew) - Rosh Hashanah 2024-2050
        // ============================================================
        const hebrewNewYearData = {
            2024: [10,3], 2025: [9,23], 2026: [9,12], 2027: [10,2], 2028: [9,21],
            2029: [9,10], 2030: [9,28], 2031: [9,18], 2032: [9,6], 2033: [9,24],
            2034: [9,14], 2035: [10,4], 2036: [9,22], 2037: [9,12], 2038: [10,1],
            2039: [9,21], 2040: [9,8], 2041: [9,28], 2042: [9,17], 2043: [9,5],
            2044: [9,25], 2045: [9,13], 2046: [10,3], 2047: [9,23], 2048: [9,11],
            2049: [10,1], 2050: [9,19]
        };

        const hebrewMonths = ["Tishrei","Cheshvan","Kislev","Tevet","Shevat","Adar","Nisan","Iyar","Sivan","Tammuz","Av","Elul"];
        const hebrewMonthsLeap = ["Tishrei","Cheshvan","Kislev","Tevet","Shevat","Adar I","Adar II","Nisan","Iyar","Sivan","Tammuz","Av","Elul"];

        // ============================================================
        // DATA KALENDER HIJRIAH
        // ============================================================
        const hijriMonths = ["Muharram","Safar","Rabi\u0027ul Awal","Rabi\u0027ul Akhir","Jumadil Awal","Jumadil Akhir",
                              "Rajab","Sya\u0027ban","Ramadhan","Syawal","Dzulqa\u0027dah","Dzulhijjah"];

        // ============================================================
        // HARI PASARAN JAWA
        // ============================================================
        const pasaranNames = ["Legi","Pahing","Pon","Wage","Kliwon"];

        // ============================================================
        // UTILITAS UMUM
        // ============================================================
        let currentDate = new Date();
        let displayDate = new Date();

        const gregorianMonths = ["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];
        const weekdays = ["Minggu","Senin","Selasa","Rabu","Kamis","Jumat","Sabtu"];
        const weekdaysShort = ["Min","Sen","Sel","Rab","Kam","Jum","Sab"];

        // ============================================================
        // KONVERSI HARI PASARAN JAWA
        // ============================================================
        function getPasaran(date) {
            const refDate = new Date(2026, 5, 29);
            const refPasaranIdx = 1;
            const diffTime = date - refDate;
            const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
            const pasaranIndex = ((diffDays + refPasaranIdx) % 5 + 5) % 5;
            return pasaranNames[pasaranIndex];
        }

        // ============================================================
        // KONVERSI HIJRIAH
        // ============================================================
        function gregorianToHijri(gregDate) {
            const d = new Date(gregDate);
            const refDate = new Date(2025, 5, 26);
            const refYear = 1447;
            const diffTime = d - refDate;
            const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
            let hijriYear = refYear;
            let remainingDays = diffDays;
            function isHijriLeap(year) {
                const rem = year % 30;
                return [2,5,7,10,13,16,18,21,24,26,29].includes(rem);
            }
            function getHijriYearDays(year) {
                return isHijriLeap(year) ? 355 : 354;
            }
            while (remainingDays >= getHijriYearDays(hijriYear)) {
                remainingDays -= getHijriYearDays(hijriYear);
                hijriYear++;
            }
            while (remainingDays < 0) {
                hijriYear--;
                remainingDays += getHijriYearDays(hijriYear);
            }
            const monthLengths = [30,29,30,29,30,29,30,29,30,29,30,29];
            if (isHijriLeap(hijriYear)) monthLengths[11] = 30;
            let hijriMonth = 0;
            let hijriDay = remainingDays + 1;
            for (let i = 0; i < 12; i++) {
                if (hijriDay <= monthLengths[i]) { hijriMonth = i; break; }
                hijriDay -= monthLengths[i];
                hijriMonth = i + 1;
            }
            return { day: hijriDay, month: hijriMonth, year: hijriYear };
        }

        // ============================================================
        // KONVERSI CINA (Imlek)
        // ============================================================
        function gregorianToChinese(gregDate) {
            const d = new Date(gregDate);
            const year = d.getFullYear();
            let cnyThisYear = chineseNewYearData[year];
            let cnyPrevYear = chineseNewYearData[year - 1];
            if (!cnyThisYear) return { day: 1, month: 0, year: year + 551, zodiac: 0, yearAnimal: "?" };
            const cnyDate = new Date(year, cnyThisYear[0] - 1, cnyThisYear[1]);
            let chineseYear, daysSinceCNY;
            if (d < cnyDate) {
                if (cnyPrevYear) {
                    const prevCnyDate = new Date(year - 1, cnyPrevYear[0] - 1, cnyPrevYear[1]);
                    daysSinceCNY = Math.floor((d - prevCnyDate) / (1000 * 60 * 60 * 24));
                    chineseYear = year - 1;
                } else { daysSinceCNY = 0; chineseYear = year; }
            } else {
                daysSinceCNY = Math.floor((d - cnyDate) / (1000 * 60 * 60 * 24));
                chineseYear = year;
            }
            const monthLengths = [30,29,30,29,30,29,30,29,30,29,30,29,30];
            let chineseMonth = 0;
            let chineseDay = daysSinceCNY + 1;
            for (let i = 0; i < 12; i++) {
                if (chineseDay <= monthLengths[i]) { chineseMonth = i; break; }
                chineseDay -= monthLengths[i];
                chineseMonth = i + 1;
            }
            const imlekYear = chineseYear + 551;
            const zodiacIndex = ((chineseYear - 4) % 12 + 12) % 12;
            return { day: chineseDay, month: chineseMonth, year: imlekYear, zodiac: zodiacIndex, yearAnimal: chineseZodiac[zodiacIndex] };
        }

        // ============================================================
        // KONVERSI IBRANI (Hebrew)
        // ============================================================
        function gregorianToHebrew(gregDate) {
            const d = new Date(gregDate);
            const year = d.getFullYear();
            let roshThisYear = hebrewNewYearData[year];
            let roshPrevYear = hebrewNewYearData[year - 1];
            if (!roshThisYear) return { day: 1, month: 0, year: year + 3760, monthName: "Tishrei" };
            const roshDate = new Date(year, roshThisYear[0] - 1, roshThisYear[1]);
            let hebrewYear, daysSinceRosh;
            if (d < roshDate) {
                if (roshPrevYear) {
                    const prevRoshDate = new Date(year - 1, roshPrevYear[0] - 1, roshPrevYear[1]);
                    daysSinceRosh = Math.floor((d - prevRoshDate) / (1000 * 60 * 60 * 24));
                    hebrewYear = year - 1 + 3761;
                } else { daysSinceRosh = 0; hebrewYear = year + 3760; }
            } else {
                daysSinceRosh = Math.floor((d - roshDate) / (1000 * 60 * 60 * 24));
                hebrewYear = year + 3761;
            }
            const monthLengths = [30, 29, 30, 29, 30, 29, 30, 29, 30, 29, 30, 29, 30];
            let hebrewMonth = 0;
            let hebrewDay = daysSinceRosh + 1;
            for (let i = 0; i < 13; i++) {
                if (hebrewDay <= monthLengths[i]) { hebrewMonth = i; break; }
                hebrewDay -= monthLengths[i];
                hebrewMonth = i + 1;
            }
            const isLeap = hebrewMonth > 5;
            const months = isLeap && hebrewMonth >= 6 ? hebrewMonthsLeap : hebrewMonths;
            const monthName = months[Math.min(hebrewMonth, months.length - 1)] || "Tishrei";
            return { day: hebrewDay, month: hebrewMonth, year: hebrewYear, monthName: monthName };
        }

        // ============================================================
        // MODAL FUNCTIONS
        // ============================================================
        function showModal(date) {
            const hijri = gregorianToHijri(date);
            const chinese = gregorianToChinese(date);
            const hebrew = gregorianToHebrew(date);
            const pasaran = getPasaran(date);
            const dayOfWeek = date.getDay();

            const html = `
                <div class="modal-date-row masehi">
                    <div class="icon">📅</div>
                    <div class="info">
                        <div class="label">Masehi (Gregorian)</div>
                        <div class="value">${weekdays[dayOfWeek]}, ${date.getDate()} ${gregorianMonths[date.getMonth()]} ${date.getFullYear()}</div>
                    </div>
                </div>
                <div class="modal-date-row hijri">
                    <div class="icon">🌙</div>
                    <div class="info">
                        <div class="label">Hijriah (Islam)</div>
                        <div class="value">${hijri.day} ${hijriMonths[hijri.month]} ${hijri.year} H</div>
                        <div class="sub">Tahun ${hijri.year} Hijriah</div>
                    </div>
                </div>
                <div class="modal-date-row chinese">
                    <div class="icon">🐉</div>
                    <div class="info">
                        <div class="label">Imlek (Cina)</div>
                        <div class="value">${chineseMonths[chinese.month]} ${chinese.day}, Tahun ${chinese.year}</div>
                        <div class="sub">Shio ${chinese.yearAnimal}</div>
                    </div>
                </div>
                <div class="modal-date-row hebrew">
                    <div class="icon">✡️</div>
                    <div class="info">
                        <div class="label">Ibrani (Hebrew)</div>
                        <div class="value">${hebrew.day} ${hebrew.monthName} ${hebrew.year}</div>
                        <div class="sub">Tahun ${hebrew.year}</div>
                    </div>
                </div>
                <div class="modal-date-row pasaran">
                    <div class="icon">🕉️</div>
                    <div class="info">
                        <div class="label">Pasaran Jawa</div>
                        <div class="value">${weekdays[dayOfWeek]} ${pasaran}</div>
                        <div class="sub">Siklus 5 hari: Legi, Pahing, Pon, Wage, Kliwon</div>
                    </div>
                </div>
            `;
            document.getElementById("modalDates").innerHTML = html;
            document.getElementById("modalOverlay").classList.add("show");
        }

        function closeModal(e) {
            if (!e || e.target === document.getElementById("modalOverlay") || e.target.closest('.modal-close')) {
                document.getElementById("modalOverlay").classList.remove("show");
            }
        }

        function searchDate() {
            const input = document.getElementById("searchDate").value;
            if (input) {
                const date = new Date(input + "T00:00:00");
                showModal(date);
            }
        }

        // ============================================================
        // RENDER KARTU HARI INI
        // ============================================================
        function renderToday() {
            const today = new Date();
            const hijri = gregorianToHijri(today);
            const chinese = gregorianToChinese(today);
            const hebrew = gregorianToHebrew(today);
            const pasaran = getPasaran(today);
            const html = `
                <div class="date-box" onclick="showModal(new Date())">
                    <div class="label">Masehi (Gregorian)</div>
                    <div class="day-num">${today.getDate()}</div>
                    <div class="month-year">${gregorianMonths[today.getMonth()]} ${today.getFullYear()}</div>
                    <div class="weekday">${weekdays[today.getDay()]}</div>
                    <div class="pasaran">${pasaran}</div>
                </div>
                <div class="date-box hijri" onclick="showModal(new Date())">
                    <div class="label">Hijriah (Islam)</div>
                    <div class="day-num">${hijri.day}</div>
                    <div class="month-year">${hijriMonths[hijri.month]}</div>
                    <div class="weekday">Tahun ${hijri.year} H</div>
                    <div class="pasaran">${pasaran}</div>
                </div>
                <div class="date-box chinese" onclick="showModal(new Date())">
                    <div class="label">Imlek (Cina)</div>
                    <div class="day-num">${chinese.day}</div>
                    <div class="month-year">${chineseMonths[chinese.month]}</div>
                    <div class="weekday">Tahun ${chinese.year} · Shio ${chinese.yearAnimal}</div>
                    <div class="pasaran">${pasaran}</div>
                </div>
                <div class="date-box hebrew" onclick="showModal(new Date())">
                    <div class="label">Ibrani (Hebrew)</div>
                    <div class="day-num">${hebrew.day}</div>
                    <div class="month-year">${hebrew.monthName}</div>
                    <div class="weekday">Tahun ${hebrew.year}</div>
                    <div class="pasaran">${pasaran}</div>
                </div>
            `;
            document.getElementById("todayGrid").innerHTML = html;
        }

        // ============================================================
        // RENDER KALENDER BULANAN
        // ============================================================
        function renderCalendar() {
            const year = displayDate.getFullYear();
            const month = displayDate.getMonth();
            document.getElementById("currentMonth").textContent = `${gregorianMonths[month]} ${year}`;
            const headerHtml = weekdaysShort.map(d => `<div class="day-header">${d}</div>`).join("");
            document.getElementById("calendarHeader").innerHTML = headerHtml;
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const daysInPrevMonth = new Date(year, month, 0).getDate();
            const today = new Date();
            const isCurrentMonth = today.getFullYear() === year && today.getMonth() === month;
            let html = "";
            for (let i = firstDay - 1; i >= 0; i--) {
                const day = daysInPrevMonth - i;
                const date = new Date(year, month - 1, day);
                html += renderDayCell(date, day, true);
            }
            for (let day = 1; day <= daysInMonth; day++) {
                const date = new Date(year, month, day);
                html += renderDayCell(date, day, false, isCurrentMonth && today.getDate() === day);
            }
            const totalCells = Math.ceil((firstDay + daysInMonth) / 7) * 7;
            const remainingCells = totalCells - (firstDay + daysInMonth);
            for (let day = 1; day <= remainingCells; day++) {
                const date = new Date(year, month + 1, day);
                html += renderDayCell(date, day, true);
            }
            document.getElementById("calendarGrid").innerHTML = html;
            setupTooltips();
            setupDayClicks();
        }

        function renderDayCell(date, dayNum, isOtherMonth, isToday) {
            const hijri = gregorianToHijri(date);
            const chinese = gregorianToChinese(date);
            const hebrew = gregorianToHebrew(date);
            const pasaran = getPasaran(date);
            const dayOfWeek = date.getDay();
            const isWeekend = dayOfWeek === 0 || dayOfWeek === 6;
            const dateStr = `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
            const tooltipData = `
                <div class="tt-row"><span class="tt-label">Masehi</span><span>${dayNum} ${gregorianMonths[date.getMonth()]} ${date.getFullYear()}</span></div>
                <div class="tt-row"><span class="tt-label">Hijriah</span><span>${hijri.day} ${hijriMonths[hijri.month]} · Tahun ${hijri.year} H</span></div>
                <div class="tt-row"><span class="tt-label">Imlek</span><span>${chineseMonths[chinese.month]} ${chinese.day} · Tahun ${chinese.year} · Shio ${chinese.yearAnimal}</span></div>
                <div class="tt-row"><span class="tt-label">Ibrani</span><span>${hebrew.day} ${hebrew.monthName} · Tahun ${hebrew.year}</span></div>
                <div class="tt-row"><span class="tt-label">Pasaran</span><span>${weekdays[dayOfWeek]} ${pasaran}</span></div>
            `;
            return `
                <div class="day-cell ${isOtherMonth ? "other-month" : ""} ${isToday ? "today" : ""}" data-date="${dateStr}" data-tooltip="${tooltipData.replace(/"/g, "&quot;")}">
                    ${isWeekend ? "<div class=\"weekend\"></div>" : ""}
                    <div class="gregorian">${dayNum}</div>
                    <div class="hijri-small">${hijri.day}</div>
                    <div class="chinese-small">${chineseMonths[chinese.month].substring(0,3)} ${chinese.day}</div>
                    <div class="pasaran-small">${pasaran}</div>
                </div>
            `;
        }

        function setupTooltips() {
            const tooltip = document.getElementById("tooltip");
            const cells = document.querySelectorAll(".day-cell");
            cells.forEach(cell => {
                cell.addEventListener("mouseenter", (e) => {
                    const data = cell.getAttribute("data-tooltip");
                    if (data) { tooltip.innerHTML = data; tooltip.classList.add("show"); }
                });
                cell.addEventListener("mousemove", (e) => {
                    const x = e.clientX + 15;
                    const y = e.clientY + 15;
                    const rect = tooltip.getBoundingClientRect();
                    const finalX = x + rect.width > window.innerWidth ? e.clientX - rect.width - 10 : x;
                    const finalY = y + rect.height > window.innerHeight ? e.clientY - rect.height - 10 : y;
                    tooltip.style.left = finalX + "px";
                    tooltip.style.top = finalY + "px";
                });
                cell.addEventListener("mouseleave", () => { tooltip.classList.remove("show"); });
            });
        }

        function setupDayClicks() {
            const cells = document.querySelectorAll(".day-cell");
            cells.forEach(cell => {
                cell.addEventListener("click", () => {
                    const dateStr = cell.getAttribute("data-date");
                    if (dateStr) {
                        const date = new Date(dateStr + "T00:00:00");
                        showModal(date);
                    }
                });
            });
        }

        function changeMonth(delta) {
            displayDate.setMonth(displayDate.getMonth() + delta);
            renderCalendar();
        }

        // ============================================================
        // INISIALISASI
        // ============================================================
        renderToday();
        renderCalendar();
    </script>
</body>
