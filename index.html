<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalender 5 Penaung Waktu</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Naskh+Arabic:wght@400;700&family=Noto+Serif+SC:wght@400;700&family=Noto+Serif+Hebrew:wght@400;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #f0f4f8;
            min-height: 100vh;
            padding: 20px;
        }

        .container { max-width: 1400px; margin: 0 auto; }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2rem;
            color: #1a365d;
            margin-bottom: 8px;
        }

        header p {
            color: #64748b;
            font-size: 0.95rem;
        }

        .today-card {
            background: #1e293b;
            color: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }

        .today-card h2 {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.7;
            margin-bottom: 20px;
        }

        .dates-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .date-box {
            background: rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.2s, background 0.2s;
        }

        .date-box:hover {
            transform: translateY(-3px);
            background: rgba(255,255,255,0.12);
        }

        .date-box .label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            opacity: 0.6;
            margin-bottom: 8px;
        }

        .date-box .day-num {
            font-size: 2.2rem;
            font-weight: 700;
            line-height: 1;
            margin-bottom: 6px;
        }

        .date-box .month-year {
            font-size: 0.95rem;
            opacity: 0.9;
        }

        .date-box .weekday {
            font-size: 0.85rem;
            opacity: 0.7;
            margin-top: 4px;
        }

        .date-box .pasaran {
            font-size: 0.8rem;
            color: #fbbf24;
            margin-top: 6px;
            font-weight: 600;
        }

        .hijri .month-year, .hijri .day-num {
            font-family: 'Noto Naskh Arabic', serif;
            direction: rtl;
        }

        .chinese .month-year, .chinese .day-num {
            font-family: 'Noto Serif SC', serif;
        }

        .hebrew .month-year, .hebrew .day-num {
            font-family: 'Noto Serif Hebrew', serif;
            direction: rtl;
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .controls button {
            background: white;
            border: 2px solid #e2e8f0;
            width: 44px;
            height: 44px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1.2rem;
            color: #475569;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .controls button:hover {
            border-color: #3b82f6;
            color: #3b82f6;
            transform: scale(1.05);
        }

        .controls .current-month {
            font-size: 1.3rem;
            font-weight: 600;
            color: #1e293b;
            min-width: 220px;
            text-align: center;
        }

        .calendar-wrapper {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
        }

        .calendar-header {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            margin-bottom: 12px;
        }

        .day-header {
            text-align: center;
            font-size: 0.8rem;
            font-weight: 600;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 10px 0;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
        }

        .day-cell {
            aspect-ratio: 1;
            border-radius: 14px;
            padding: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
            position: relative;
            min-height: 90px;
        }

        .day-cell:hover {
            background: #f1f5f9;
            border-color: #cbd5e1;
        }

        .day-cell.today {
            background: #1e293b;
            color: white;
            box-shadow: 0 4px 12px rgba(30,41,59,0.3);
        }

        .day-cell.today:hover {
            background: #334155;
        }

        .day-cell.other-month {
            opacity: 0.35;
        }

        .day-cell .gregorian {
            font-size: 1.1rem;
            font-weight: 600;
            line-height: 1;
        }

        .day-cell .hijri-small {
            font-family: 'Noto Naskh Arabic', serif;
            font-size: 0.65rem;
            opacity: 0.7;
            margin-top: 2px;
            direction: rtl;
        }

        .day-cell .chinese-small {
            font-family: 'Inter', sans-serif;
            font-size: 0.55rem;
            opacity: 0.6;
            margin-top: 1px;
            font-weight: 500;
        }

        .day-cell .pasaran-small {
            font-size: 0.55rem;
            font-weight: 600;
            color: #d97706;
            margin-top: 2px;
            letter-spacing: 0.5px;
        }

        .day-cell.today .hijri-small,
        .day-cell.today .chinese-small {
            opacity: 0.9;
        }

        .day-cell.today .pasaran-small {
            color: #fbbf24;
        }

        .day-cell .weekend {
            position: absolute;
            top: 6px;
            right: 6px;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #ef4444;
        }

        .day-cell.today .weekend {
            background: #f87171;
        }

        .legend {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-top: 20px;
            flex-wrap: wrap;
            font-size: 0.8rem;
            color: #64748b;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .tooltip {
            position: fixed;
            background: #1e293b;
            color: white;
            padding: 14px 18px;
            border-radius: 14px;
            font-size: 0.85rem;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            max-width: 300px;
            line-height: 1.7;
        }

        .tooltip.show { opacity: 1; }

        .tooltip .tt-row {
            display: flex;
            justify-content: space-between;
            gap: 15px;
        }

        .tooltip .tt-label {
            opacity: 0.6;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        @media (max-width: 768px) {
            .day-cell {
                min-height: 65px;
                padding: 4px;
            }
            .day-cell .gregorian { font-size: 0.85rem; }
            .day-cell .hijri-small, .day-cell .chinese-small { font-size: 0.45rem; }
            .day-cell .pasaran-small { font-size: 0.45rem; }
            header h1 { font-size: 1.4rem; }
            .dates-grid { grid-template-columns: 1fr 1fr; }
            .date-box .day-num { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📅 Kalender 5 Penaung Waktu</h1>
            <p>Masehi • Hijriah • Imlek (Cina) • Ibrani • Pasaran Jawa</p>
        </header>

        <div class="today-card">
            <h2>Hari Ini</h2>
            <div class="dates-grid" id="todayGrid"></div>
        </div>

        <div class="controls">
            <button onclick="changeMonth(-1)">◀</button>
            <div class="current-month" id="currentMonth"></div>
            <button onclick="changeMonth(1)">▶</button>
        </div>

        <div class="calendar-wrapper">
            <div class="calendar-header" id="calendarHeader"></div>
            <div class="calendar-grid" id="calendarGrid"></div>
            <div class="legend">
                <div class="legend-item">
                    <div class="legend-dot" style="background:#1e293b"></div>
                    <span>Hari Ini</span>
                </div>
                <div class="legend-item">
                    <div class="legend-dot" style="background:#ef4444"></div>
                    <span>Akhir Pekan</span>
                </div>
                <div class="legend-item">
                    <div class="legend-dot" style="background:#d97706"></div>
                    <span>Pasaran Jawa</span>
                </div>
            </div>
        </div>
    </div>

    <div class="tooltip" id="tooltip"></div>

    <script>
        // ============================================================
        // DATA KALENDER CINA (Imlek) - Data astronomi 2024-2100
        // ============================================================
        const chineseNewYearData = {
            2024: [2,10], 2025: [1,29], 2026: [2,17], 2027: [2,6], 2028: [1,26],
            2029: [2,13], 2030: [2,3], 2031: [1,23], 2032: [2,11], 2033: [1,31],
            2034: [2,19], 2035: [2,8], 2036: [1,28], 2037: [2,15], 2038: [2,4],
            2039: [1,24], 2040: [2,12], 2041: [2,1], 2042: [1,22], 2043: [2,10],
            2044: [1,30], 2045: [2,17], 2046: [2,6], 2047: [1,26], 2048: [2,14],
            2049: [2,2], 2050: [1,23], 2051: [2,11], 2052: [2,1], 2053: [2,19],
            2054: [2,8], 2055: [1,28], 2056: [2,15], 2057: [2,4], 2058: [1,24],
            2059: [2,12], 2060: [2,2], 2061: [1,21], 2062: [2,9], 2063: [1,29],
            2064: [2,17], 2065: [2,5], 2066: [1,26], 2067: [2,14], 2068: [2,3],
            2069: [1,23], 2070: [2,11], 2071: [2,1], 2072: [2,19], 2073: [2,7],
            2074: [1,27], 2075: [2,15], 2076: [2,5], 2077: [1,24], 2078: [2,12],
            2079: [2,2], 2080: [1,22], 2081: [2,9], 2082: [1,29], 2083: [2,17],
            2084: [2,6], 2085: [1,26], 2086: [2,14], 2087: [2,3], 2088: [1,24],
            2089: [2,10], 2090: [1,30], 2091: [2,18], 2092: [2,7], 2093: [1,27],
            2094: [2,15], 2095: [2,5], 2096: [1,25], 2097: [2,12], 2098: [2,2],
            2099: [1,22], 2100: [2,11]
        };

        const chineseMonths = ["\u6B63\u6708","\u4E8C\u6708","\u4E09\u6708","\u56DB\u6708","\u4E94\u6708","\u516D\u6708","\u4E03\u6708","\u516B\u6708","\u4E5D\u6708","\u5341\u6708","\u51AC\u6708","\u814A\u6708"];
        const chineseDays = ["\u521D\u4E00","\u521D\u4E8C","\u521D\u4E09","\u521D\u56DB","\u521D\u4E94","\u521D\u516D","\u521D\u4E03","\u521D\u516B","\u521D\u4E5D","\u521D\u5341",
                           "\u5341\u4E00","\u5341\u4E8C","\u5341\u4E09","\u5341\u56DB","\u5341\u4E94","\u5341\u516D","\u5341\u4E03","\u5341\u516B","\u5341\u4E5D","\u4E8C\u5341",
                           "\u5EFF\u4E00","\u5EFF\u4E8C","\u5EFF\u4E09","\u5EFF\u56DB","\u5EFF\u4E94","\u5EFF\u516D","\u5EFF\u4E03","\u5EFF\u516B","\u5EFF\u4E5D","\u4E09\u5341"];
        const chineseZodiac = ["\u9F20","\u725B","\u864E","\u5154","\u9F99","\u86C7","\u9A6C","\u7F8A","\u7334","\u9E21","\u72D7","\u732A"];

        // ============================================================
        // DATA KALENDER IBRANI (Hebrew) - Rosh Hashanah 2024-2050
        // ============================================================
        const hebrewNewYearData = {
            2024: [10,3], 2025: [9,23], 2026: [9,12], 2027: [10,2], 2028: [9,21],
            2029: [9,10], 2030: [9,28], 2031: [9,18], 2032: [9,6], 2033: [9,24],
            2034: [9,14], 2035: [10,4], 2036: [9,22], 2037: [9,12], 2038: [10,1],
            2039: [9,21], 2040: [9,8], 2041: [9,28], 2042: [9,17], 2043: [9,5],
            2044: [9,25], 2045: [9,13], 2046: [10,3], 2047: [9,23], 2048: [9,11],
            2049: [10,1], 2050: [9,19]
        };

        const hebrewMonths = ["Tishrei","Cheshvan","Kislev","Tevet","Shevat","Adar","Nisan","Iyar","Sivan","Tammuz","Av","Elul"];
        const hebrewMonthsLeap = ["Tishrei","Cheshvan","Kislev","Tevet","Shevat","Adar I","Adar II","Nisan","Iyar","Sivan","Tammuz","Av","Elul"];

        // ============================================================
        // DATA KALENDER HIJRIAH
        // ============================================================
        const hijriMonths = ["Muharram","Safar","Rabi\u0027ul Awal","Rabi\u0027ul Akhir","Jumadil Awal","Jumadil Akhir",
                              "Rajab","Sya\u0027ban","Ramadhan","Syawal","Dzulqa\u0027dah","Dzulhijjah"];

        // ============================================================
        // HARI PASARAN JAWA
        // Siklus 5 hari: Legi, Pahing, Pon, Wage, Kliwon
        // Referensi: 29 Juni 2026 = Senin Pahing (index 1)
        // ============================================================
        const pasaranNames = ["Legi","Pahing","Pon","Wage","Kliwon"];

        // ============================================================
        // UTILITAS UMUM
        // ============================================================
        let currentDate = new Date();
        let displayDate = new Date();

        const gregorianMonths = ["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];
        const weekdays = ["Minggu","Senin","Selasa","Rabu","Kamis","Jumat","Sabtu"];
        const weekdaysShort = ["Min","Sen","Sel","Rab","Kam","Jum","Sab"];

        // ============================================================
        // KONVERSI HARI PASARAN JAWA
        // Referensi: 29 Juni 2026 = Pahing (index 1)
        // ============================================================
        function getPasaran(date) {
            const refDate = new Date(2026, 5, 29);
            const refPasaranIdx = 1;
            const diffTime = date - refDate;
            const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
            const pasaranIndex = ((diffDays + refPasaranIdx) % 5 + 5) % 5;
            return pasaranNames[pasaranIndex];
        }

        // ============================================================
        // KONVERSI HIJRIAH (Algoritma Ummul Qura)
        // Referensi: 1 Muharram 1447 = 26 Juni 2025
        // ============================================================
        function gregorianToHijri(gregDate) {
            const d = new Date(gregDate);
            const refDate = new Date(2025, 5, 26);
            const refYear = 1447;
            const diffTime = d - refDate;
            const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
            let hijriYear = refYear;
            let remainingDays = diffDays;
            function isHijriLeap(year) {
                const rem = year % 30;
                return [2,5,7,10,13,16,18,21,24,26,29].includes(rem);
            }
            function getHijriYearDays(year) {
                return isHijriLeap(year) ? 355 : 354;
            }
            while (remainingDays >= getHijriYearDays(hijriYear)) {
                remainingDays -= getHijriYearDays(hijriYear);
                hijriYear++;
            }
            while (remainingDays < 0) {
                hijriYear--;
                remainingDays += getHijriYearDays(hijriYear);
            }
            const monthLengths = [30,29,30,29,30,29,30,29,30,29,30,29];
            if (isHijriLeap(hijriYear)) monthLengths[11] = 30;
            let hijriMonth = 0;
            let hijriDay = remainingDays + 1;
            for (let i = 0; i < 12; i++) {
                if (hijriDay <= monthLengths[i]) { hijriMonth = i; break; }
                hijriDay -= monthLengths[i];
                hijriMonth = i + 1;
            }
            return { day: hijriDay, month: hijriMonth, year: hijriYear };
        }

        // ============================================================
        // KONVERSI CINA (Imlek)
        // ============================================================
        function gregorianToChinese(gregDate) {
            const d = new Date(gregDate);
            const year = d.getFullYear();
            let cnyThisYear = chineseNewYearData[year];
            let cnyPrevYear = chineseNewYearData[year - 1];
            if (!cnyThisYear) return { day: 1, month: 0, year: year - 1900 + 1, zodiac: 0, yearAnimal: "?" };
            const cnyDate = new Date(year, cnyThisYear[0] - 1, cnyThisYear[1]);
            let chineseYear, daysSinceCNY;
            if (d < cnyDate) {
                if (cnyPrevYear) {
                    const prevCnyDate = new Date(year - 1, cnyPrevYear[0] - 1, cnyPrevYear[1]);
                    daysSinceCNY = Math.floor((d - prevCnyDate) / (1000 * 60 * 60 * 24));
                    chineseYear = year - 1;
                } else { daysSinceCNY = 0; chineseYear = year; }
            } else {
                daysSinceCNY = Math.floor((d - cnyDate) / (1000 * 60 * 60 * 24));
                chineseYear = year;
            }
            const monthLengths = [30,29,30,29,30,29,30,29,30,29,30,29,30];
            let chineseMonth = 0;
            let chineseDay = daysSinceCNY + 1;
            for (let i = 0; i < 12; i++) {
                if (chineseDay <= monthLengths[i]) { chineseMonth = i; break; }
                chineseDay -= monthLengths[i];
                chineseMonth = i + 1;
            }
            const zodiacIndex = ((chineseYear - 4) % 12 + 12) % 12;
            return { day: chineseDay, month: chineseMonth, year: chineseYear - 1900 + 1, zodiac: zodiacIndex, yearAnimal: chineseZodiac[zodiacIndex] };
        }

        // ============================================================
        // KONVERSI IBRANI (Hebrew)
        // ============================================================
        function gregorianToHebrew(gregDate) {
            const d = new Date(gregDate);
            const year = d.getFullYear();
            let roshThisYear = hebrewNewYearData[year];
            let roshPrevYear = hebrewNewYearData[year - 1];
            if (!roshThisYear) return { day: 1, month: 0, year: year + 3760, monthName: "Tishrei" };
            const roshDate = new Date(year, roshThisYear[0] - 1, roshThisYear[1]);
            let hebrewYear, daysSinceRosh;
            if (d < roshDate) {
                if (roshPrevYear) {
                    const prevRoshDate = new Date(year - 1, roshPrevYear[0] - 1, roshPrevYear[1]);
                    daysSinceRosh = Math.floor((d - prevRoshDate) / (1000 * 60 * 60 * 24));
                    hebrewYear = year - 1 + 3761;
                } else { daysSinceRosh = 0; hebrewYear = year + 3760; }
            } else {
                daysSinceRosh = Math.floor((d - roshDate) / (1000 * 60 * 60 * 24));
                hebrewYear = year + 3761;
            }
            const monthLengths = [30, 29, 30, 29, 30, 29, 30, 29, 30, 29, 30, 29, 30];
            let hebrewMonth = 0;
            let hebrewDay = daysSinceRosh + 1;
            for (let i = 0; i < 13; i++) {
                if (hebrewDay <= monthLengths[i]) { hebrewMonth = i; break; }
                hebrewDay -= monthLengths[i];
                hebrewMonth = i + 1;
            }
            const isLeap = hebrewMonth > 5;
            const months = isLeap && hebrewMonth >= 6 ? hebrewMonthsLeap : hebrewMonths;
            const monthName = months[Math.min(hebrewMonth, months.length - 1)] || "Tishrei";
            return { day: hebrewDay, month: hebrewMonth, year: hebrewYear, monthName: monthName };
        }

        // ============================================================
        // RENDER KARTU HARI INI
        // ============================================================
        function renderToday() {
            const today = new Date();
            const hijri = gregorianToHijri(today);
            const chinese = gregorianToChinese(today);
            const hebrew = gregorianToHebrew(today);
            const pasaran = getPasaran(today);
            const html = `
                <div class="date-box">
                    <div class="label">Masehi (Gregorian)</div>
                    <div class="day-num">${today.getDate()}</div>
                    <div class="month-year">${gregorianMonths[today.getMonth()]} ${today.getFullYear()}</div>
                    <div class="weekday">${weekdays[today.getDay()]}</div>
                    <div class="pasaran">${pasaran}</div>
                </div>
                <div class="date-box hijri">
                    <div class="label">Hijriah (Islam)</div>
                    <div class="day-num">${hijri.day}</div>
                    <div class="month-year">${hijriMonths[hijri.month]}</div>
                    <div class="weekday">Tahun ${hijri.year} H</div>
                    <div class="pasaran">${pasaran}</div>
                </div>
                <div class="date-box chinese">
                    <div class="label">Imlek (Cina)</div>
                    <div class="day-num">${chinese.day}</div>
                    <div class="month-year">${chineseMonths[chinese.month]}</div>
                    <div class="weekday">Tahun ${chinese.year} · Shio ${chinese.yearAnimal}</div>
                    <div class="pasaran">${pasaran}</div>
                </div>
                <div class="date-box hebrew">
                    <div class="label">Ibrani (Hebrew)</div>
                    <div class="day-num">${hebrew.day}</div>
                    <div class="month-year">${hebrew.monthName}</div>
                    <div class="weekday">Tahun ${hebrew.year}</div>
                    <div class="pasaran">${pasaran}</div>
                </div>
            `;
            document.getElementById("todayGrid").innerHTML = html;
        }

        // ============================================================
        // RENDER KALENDER BULANAN
        // ============================================================
        function renderCalendar() {
            const year = displayDate.getFullYear();
            const month = displayDate.getMonth();
            document.getElementById("currentMonth").textContent = `${gregorianMonths[month]} ${year}`;
            const headerHtml = weekdaysShort.map(d => `<div class="day-header">${d}</div>`).join("");
            document.getElementById("calendarHeader").innerHTML = headerHtml;
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const daysInPrevMonth = new Date(year, month, 0).getDate();
            const today = new Date();
            const isCurrentMonth = today.getFullYear() === year && today.getMonth() === month;
            let html = "";
            for (let i = firstDay - 1; i >= 0; i--) {
                const day = daysInPrevMonth - i;
                const date = new Date(year, month - 1, day);
                html += renderDayCell(date, day, true);
            }
            for (let day = 1; day <= daysInMonth; day++) {
                const date = new Date(year, month, day);
                html += renderDayCell(date, day, false, isCurrentMonth && today.getDate() === day);
            }
            const totalCells = Math.ceil((firstDay + daysInMonth) / 7) * 7;
            const remainingCells = totalCells - (firstDay + daysInMonth);
            for (let day = 1; day <= remainingCells; day++) {
                const date = new Date(year, month + 1, day);
                html += renderDayCell(date, day, true);
            }
            document.getElementById("calendarGrid").innerHTML = html;
            setupTooltips();
        }

        function renderDayCell(date, dayNum, isOtherMonth, isToday) {
            const hijri = gregorianToHijri(date);
            const chinese = gregorianToChinese(date);
            const hebrew = gregorianToHebrew(date);
            const pasaran = getPasaran(date);
            const dayOfWeek = date.getDay();
            const isWeekend = dayOfWeek === 0 || dayOfWeek === 6;
            const tooltipData = `
                <div class="tt-row"><span class="tt-label">Masehi</span><span>${dayNum} ${gregorianMonths[date.getMonth()]} ${date.getFullYear()}</span></div>
                <div class="tt-row"><span class="tt-label">Hijriah</span><span>${hijri.day} ${hijriMonths[hijri.month]} · Tahun ${hijri.year} H</span></div>
                <div class="tt-row"><span class="tt-label">Imlek</span><span>${chineseMonths[chinese.month]} ${chinese.day} · Tahun ${chinese.year} · Shio ${chinese.yearAnimal}</span></div>
                <div class="tt-row"><span class="tt-label">Ibrani</span><span>${hebrew.day} ${hebrew.monthName} · Tahun ${hebrew.year}</span></div>
                <div class="tt-row"><span class="tt-label">Pasaran</span><span>${weekdays[dayOfWeek]} ${pasaran}</span></div>
            `;
            return `
                <div class="day-cell ${isOtherMonth ? "other-month" : ""} ${isToday ? "today" : ""}" data-tooltip="${tooltipData.replace(/"/g, "&quot;")}">
                    ${isWeekend ? "<div class=\"weekend\"></div>" : ""}
                    <div class="gregorian">${dayNum}</div>
                    <div class="hijri-small">${hijri.day}</div>
                    <div class="chinese-small">${chinese.month + 1}/${chinese.day}</div>
                    <div class="pasaran-small">${pasaran}</div>
                </div>
            `;
        }

        function setupTooltips() {
            const tooltip = document.getElementById("tooltip");
            const cells = document.querySelectorAll(".day-cell");
            cells.forEach(cell => {
                cell.addEventListener("mouseenter", (e) => {
                    const data = cell.getAttribute("data-tooltip");
                    if (data) { tooltip.innerHTML = data; tooltip.classList.add("show"); }
                });
                cell.addEventListener("mousemove", (e) => {
                    const x = e.clientX + 15;
                    const y = e.clientY + 15;
                    const rect = tooltip.getBoundingClientRect();
                    const finalX = x + rect.width > window.innerWidth ? e.clientX - rect.width - 10 : x;
                    const finalY = y + rect.height > window.innerHeight ? e.clientY - rect.height - 10 : y;
                    tooltip.style.left = finalX + "px";
                    tooltip.style.top = finalY + "px";
                });
                cell.addEventListener("mouseleave", () => { tooltip.classList.remove("show"); });
            });
        }

        function changeMonth(delta) {
            displayDate.setMonth(displayDate.getMonth() + delta);
            renderCalendar();
        }

        renderToday();
        renderCalendar();
    </script>
</body>
</html>
