function getPasaran(date) {
    const refDate = new Date(2026, 5, 29);
    const refPasaranIdx = 1;
    const diffTime = date - refDate;
    const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
    const pasaranIndex = ((diffDays + refPasaranIdx) % 5 + 5) % 5;
    return pasaranNames[pasaranIndex];
}

function gregorianToHijri(gregDate) {
    const d = new Date(gregDate);
    const refDate = new Date(2025, 5, 26);
    const refYear = 1447;
    const diffTime = d - refDate;
    const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
    let hijriYear = refYear;
    let remainingDays = diffDays;
    function isHijriLeap(year) {
        const rem = year % 30;
        return [2,5,7,10,13,16,18,21,24,26,29].includes(rem);
    }
    function getHijriYearDays(year) {
        return isHijriLeap(year) ? 355 : 354;
    }
    while (remainingDays >= getHijriYearDays(hijriYear)) {
        remainingDays -= getHijriYearDays(hijriYear);
        hijriYear++;
    }
    while (remainingDays < 0) {
        hijriYear--;
        remainingDays += getHijriYearDays(hijriYear);
    }
    const monthLengths = [30,29,30,29,30,29,30,29,30,29,30,29];
    if (isHijriLeap(hijriYear)) monthLengths[11] = 30;
    let hijriMonth = 0;
    let hijriDay = remainingDays + 1;
    for (let i = 0; i < 12; i++) {
        if (hijriDay <= monthLengths[i]) { hijriMonth = i; break; }
        hijriDay -= monthLengths[i];
        hijriMonth = i + 1;
    }
    return { day: hijriDay, month: hijriMonth, year: hijriYear };
}

// ========== FUNGSI CHINESE CALENDAR (DIPERBAIKI) ==========
function gregorianToChinese(gregDate) {
    const d = new Date(gregDate);
    const year = d.getFullYear();
    const month = d.getMonth();
    const day = d.getDate();

    let cnyThisYear = chineseNewYearData[year];
    let cnyPrevYear = chineseNewYearData[year - 1];

    if (!cnyThisYear) {
        return { day: 1, month: 0, year: year + 2697, zodiac: 0, yearAnimal: "?" };
    }

    const cnyDate = new Date(year, cnyThisYear[0] - 1, cnyThisYear[1]);
    let chineseYear, daysSinceCNY;

    if (d < cnyDate) {
        if (cnyPrevYear) {
            const prevCnyDate = new Date(year - 1, cnyPrevYear[0] - 1, cnyPrevYear[1]);
            daysSinceCNY = Math.floor((d - prevCnyDate) / (1000 * 60 * 60 * 24));
            chineseYear = year - 1;
        } else {
            daysSinceCNY = 0;
            chineseYear = year;
        }
    } else {
        daysSinceCNY = Math.floor((d - cnyDate) / (1000 * 60 * 60 * 24));
        chineseYear = year;
    }

    // Chinese months alternate 30,29,30,29... approximately
    // But this is simplified - actual Chinese calendar uses astronomical new moons
    const monthLengths = [30,29,30,29,30,29,30,29,30,29,30,29,30];
    let chineseMonth = 0;
    let chineseDay = daysSinceCNY + 1;

    for (let i = 0; i < 12; i++) {
        if (chineseDay <= monthLengths[i]) {
            chineseMonth = i;
            break;
        }
        chineseDay -= monthLengths[i];
        chineseMonth = i + 1;
    }

    const imlekYear = chineseYear + 2697;
    const zodiacIndex = ((chineseYear - 4) % 12 + 12) % 12;

    return { 
        day: chineseDay, 
        month: chineseMonth, 
        year: imlekYear, 
        zodiac: zodiacIndex, 
        yearAnimal: chineseZodiac[zodiacIndex] 
    };
}

// ========== FUNGSI HEBREW CALENDAR (DIPERBAIKI TOTAL) ==========

// Pre-computed Hebrew year month lengths based on Rosh Hashanah dates
function getHebrewYearInfo(hebrewYear) {
    // Determine if leap year (19-year cycle: 3,6,8,11,14,17,19)
    const cycleYear = ((hebrewYear - 1) % 19) + 1;
    const isLeap = [3,6,8,11,14,17,19].includes(cycleYear);
    return { isLeap: isLeap };
}

function getHebrewMonthLengths(hebrewYear) {
    // Find the Gregorian year for this Hebrew year
    const gregYearStart = hebrewYear - 3761;
    
    if (gregYearStart < 1900 || gregYearStart >= 2100) {
        // Fallback for out-of-range years
        const info = getHebrewYearInfo(hebrewYear);
        if (info.isLeap) {
            return [30,29,30,29,30,30,29,30,29,30,29,30,29]; // 384 days
        } else {
            return [30,29,30,29,30,29,30,29,30,29,30,29]; // 354 days
        }
    }
    
    const roshThis = hebrewNewYearData[gregYearStart];
    const roshNext = hebrewNewYearData[gregYearStart + 1];
    
    if (!roshThis || !roshNext) {
        // Fallback
        const info = getHebrewYearInfo(hebrewYear);
        if (info.isLeap) {
            return [30,29,30,29,30,30,29,30,29,30,29,30,29];
        } else {
            return [30,29,30,29,30,29,30,29,30,29,30,29];
        }
    }
    
    const d1 = new Date(gregYearStart, roshThis[0] - 1, roshThis[1]);
    const d2 = new Date(gregYearStart + 1, roshNext[0] - 1, roshNext[1]);
    const totalDays = Math.floor((d2 - d1) / (1000 * 60 * 60 * 24));
    
    const info = getHebrewYearInfo(hebrewYear);
    const isLeap = info.isLeap;
    
    // Base month lengths
    let months;
    if (isLeap) {
        months = [30, 29, 30, 29, 30, 30, 29, 30, 29, 30, 29, 30, 29]; // 384 base
    } else {
        months = [30, 29, 30, 29, 30, 29, 30, 29, 30, 29, 30, 29]; // 354 base
    }
    
    const baseDays = isLeap ? 384 : 354;
    const diff = totalDays - baseDays;
    
    // Adjust Cheshvan (index 1) and Kislev (index 2)
    if (diff === -1) {
        // Deficient: shorten Kislev to 29
        months[2] = 29;
    } else if (diff === 0) {
        // Regular: no change
    } else if (diff === 1) {
        // Complete: lengthen Cheshvan to 30
        months[1] = 30;
    } else if (diff === -2 && isLeap) {
        // Deficient leap year
        months[1] = 29;
        months[2] = 29;
    }
    
    return months;
}

function gregorianToHebrew(gregDate) {
    const d = new Date(gregDate);
    const year = d.getFullYear();
    
    let roshThisYear = hebrewNewYearData[year];
    let roshPrevYear = hebrewNewYearData[year - 1];
    
    if (!roshThisYear) {
        // Out of range - use approximation
        return { day: 1, month: 0, year: year + 3760, monthName: "Tishrei" };
    }
    
    const roshDate = new Date(year, roshThisYear[0] - 1, roshThisYear[1]);
    let hebrewYear, daysSinceRosh;
    
    if (d < roshDate) {
        if (roshPrevYear) {
            const prevRoshDate = new Date(year - 1, roshPrevYear[0] - 1, roshPrevYear[1]);
            daysSinceRosh = Math.floor((d - prevRoshDate) / (1000 * 60 * 60 * 24));
            hebrewYear = year - 1 + 3761;
        } else {
            daysSinceRosh = 0;
            hebrewYear = year + 3760;
        }
    } else {
        daysSinceRosh = Math.floor((d - roshDate) / (1000 * 60 * 60 * 24));
        hebrewYear = year + 3761;
    }
    
    // Get accurate month lengths for this Hebrew year
    const monthLengths = getHebrewMonthLengths(hebrewYear);
    const info = getHebrewYearInfo(hebrewYear);
    const isLeap = info.isLeap;
    
    let hebrewMonth = 0;
    let hebrewDay = daysSinceRosh + 1;
    
    for (let i = 0; i < monthLengths.length; i++) {
        if (hebrewDay <= monthLengths[i]) {
            hebrewMonth = i;
            break;
        }
        hebrewDay -= monthLengths[i];
        hebrewMonth = i + 1;
    }
    
    const months = isLeap ? hebrewMonthsLeap : hebrewMonths;
    const monthName = months[Math.min(hebrewMonth, months.length - 1)] || "Tishrei";
    
    return { day: hebrewDay, month: hebrewMonth, year: hebrewYear, monthName: monthName };
}

function renderCalendar() {
    const year = displayDate.getFullYear();
    const month = displayDate.getMonth();
    document.getElementById("currentMonth").textContent = gregorianMonths[month] + ' ' + year;
    const headerHtml = weekdaysShort.map(function(d) { return '<div class="day-header">' + d + '</div>'; }).join("");
    document.getElementById("calendarHeader").innerHTML = headerHtml;
    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const daysInPrevMonth = new Date(year, month, 0).getDate();
    const today = new Date();
    const isCurrentMonth = today.getFullYear() === year && today.getMonth() === month;
    let html = "";
    for (let i = firstDay - 1; i >= 0; i--) {
        const day = daysInPrevMonth - i;
        const date = new Date(year, month - 1, day);
        html += renderDayCell(date, day, true);
    }
    for (let day = 1; day <= daysInMonth; day++) {
        const date = new Date(year, month, day);
        html += renderDayCell(date, day, false, isCurrentMonth && today.getDate() === day);
    }
    const totalCells = Math.ceil((firstDay + daysInMonth) / 7) * 7;
    const remainingCells = totalCells - (firstDay + daysInMonth);
    for (let day = 1; day <= remainingCells; day++) {
        const date = new Date(year, month + 1, day);
        html += renderDayCell(date, day, true);
    }
    document.getElementById("calendarGrid").innerHTML = html;
    setupTooltips();
    setupDayClicks();
}

function renderDayCell(date, dayNum, isOtherMonth, isToday) {
    const hijri = gregorianToHijri(date);
    const chinese = gregorianToChinese(date);
    const hebrew = gregorianToHebrew(date);
    const pasaran = getPasaran(date);
    const dayOfWeek = date.getDay();
    const isWeekend = dayOfWeek === 0 || dayOfWeek === 6;
    const dateStr = date.getFullYear() + '-' + String(date.getMonth()+1).padStart(2,'0') + '-' + String(date.getDate()).padStart(2,'0');

    return '<div class="day-cell ' + (isOtherMonth ? 'other-month ' : '') + (isToday ? 'today' : '') + '" data-date="' + dateStr + '">' +
        (isWeekend ? '<div class="weekend"></div>' : '') +
        '<div class="gregorian">' + dayNum + '</div>' +
        '<div class="hijri-small">' + hijri.day + '</div>' +
        '<div class="chinese-small">' + chineseMonths[chinese.month].substring(0,3) + ' ' + chinese.day + '</div>' +
        '<div class="pasaran-small">' + pasaran + '</div>' +
    '</div>';
}

function setupTooltips() {
    const tooltip = document.getElementById("tooltip");
    const cells = document.querySelectorAll(".day-cell");
    cells.forEach(function(cell) {
        cell.addEventListener("mouseenter", function(e) {
            const dateStr = cell.getAttribute("data-date");
            if (dateStr) {
                const parts = dateStr.split('-');
                const date = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
                const hijri = gregorianToHijri(date);
                const chinese = gregorianToChinese(date);
                const hebrew = gregorianToHebrew(date);
                const pasaran = getPasaran(date);
                const dayOfWeek = date.getDay();

                tooltip.innerHTML = '<div class="tt-row"><span class="tt-label">Masehi</span><span>' + date.getDate() + ' ' + gregorianMonths[date.getMonth()] + ' ' + date.getFullYear() + '</span></div>' +
                    '<div class="tt-row"><span class="tt-label">Hijriah</span><span>' + hijri.day + ' ' + hijriMonths[hijri.month] + ' · Tahun ' + hijri.year + ' H</span></div>' +
                    '<div class="tt-row"><span class="tt-label">Imlek</span><span>' + chineseMonths[chinese.month] + ' ' + chinese.day + ' · Tahun ' + chinese.year + ' · Shio ' + chinese.yearAnimal + '</span></div>' +
                    '<div class="tt-row"><span class="tt-label">Ibrani</span><span>' + hebrew.day + ' ' + hebrew.monthName + ' · Tahun ' + hebrew.year + '</span></div>' +
                    '<div class="tt-row"><span class="tt-label">Pasaran</span><span>' + weekdays[dayOfWeek] + ' ' + pasaran + '</span></div>';
                tooltip.classList.add("show");
            }
        });
        cell.addEventListener("mousemove", function(e) {
            const x = e.clientX + 15;
            const y = e.clientY + 15;
            const rect = tooltip.getBoundingClientRect();
            const finalX = x + rect.width > window.innerWidth ? e.clientX - rect.width - 10 : x;
            const finalY = y + rect.height > window.innerHeight ? e.clientY - rect.height - 10 : y;
            tooltip.style.left = finalX + "px";
            tooltip.style.top = finalY + "px";
        });
        cell.addEventListener("mouseleave", function() { tooltip.classList.remove("show"); });
    });
}

function setupDayClicks() {
    const cells = document.querySelectorAll(".day-cell");
    cells.forEach(function(cell) {
        cell.addEventListener("click", function() {
            const dateStr = cell.getAttribute("data-date");
            if (dateStr) {
                const parts = dateStr.split('-');
                const date = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
                showModal(date);
            }
        });
    });
}

function changeMonth(delta) {
    displayDate.setMonth(displayDate.getMonth() + delta);
    renderCalendar();
}
